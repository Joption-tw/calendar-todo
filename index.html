<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>萬年曆 & 待辦事項</title>
<style>
/* ══ Reset ══ */
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --accent: #64c8ff;
  --accent2: #a78bfa;
  --bg: transparent;
  --panel: rgba(255,255,255,0.06);
  --border: rgba(255,255,255,0.08);
}
html, body {
  height: 100%;
  font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  background: linear-gradient(135deg, rgba(20,28,58,0.55), rgba(18,30,58,0.5), rgba(12,38,80,0.5));
  color: #e8f4ff;
  overflow: hidden;
}
body { display: flex; flex-direction: column; height: 100vh; }

/* ══ 小工具模式標題列 ══ */
.widget-bar {
  background: rgba(10,22,40,0.45);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  border-bottom: 1px solid rgba(100,200,255,0.12);
  flex-shrink: 0;
  -webkit-app-region: drag;
  backdrop-filter: blur(12px);
}
.widget-bar-left {
  font-size: 0.9rem;
  font-weight: bold;
  color: var(--accent);
  letter-spacing: 1px;
  -webkit-app-region: drag;
}
.widget-bar-right {
  display: flex;
  align-items: center;
  gap: 6px;
  -webkit-app-region: no-drag;
}
.badge {
  font-size: 0.7rem;
  background: rgba(100,200,255,0.18);
  color: var(--accent);
  padding: 2px 8px;
  border-radius: 20px;
}
.icon-btn {
  background: rgba(100,200,255,0.12);
  border: 1px solid rgba(100,200,255,0.25);
  color: rgba(100,200,255,0.75);
  font-size: 0.9rem;
  width: 26px; height: 26px;
  border-radius: 6px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s;
  flex-shrink: 0;
  -webkit-app-region: no-drag;
}
.icon-btn:hover { background: rgba(100,200,255,0.3); color: var(--accent); }

/* ══ 完整模式標題（寬螢幕） ══ */
.full-header {
  display: none;
  text-align: center;
  padding: 16px 20px 10px;
  flex-shrink: 0;
}
.full-header h1 {
  font-size: 1.8rem;
  letter-spacing: 4px;
  text-shadow: 0 0 20px rgba(100,200,255,0.5);
  margin-bottom: 4px;
}
.full-header .clock {
  font-size: 2.2rem;
  font-weight: bold;
  color: var(--accent);
  font-variant-numeric: tabular-nums;
  letter-spacing: 2px;
  margin-bottom: 2px;
}
.full-header .date-info { font-size: 0.9rem; color: #aad4f5; }

/* ══ 主體 flex ══ */
.main-row {
  flex: 1;
  display: flex;
  overflow: hidden;
  gap: 0;
}

/* ══ 行事曆（預設隱藏，寬螢幕顯示） ══ */
.calendar-wrapper {
  display: none;
  flex: 1 1 0;
  min-width: 0;
  overflow-y: auto;
  padding: 16px 16px 16px 20px;
}
.calendar-inner {
  background: rgba(255,255,255,0.04);
  border-radius: 14px;
  padding: 18px;
  border: 1px solid rgba(255,255,255,0.07);
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  backdrop-filter: blur(8px);
}
.nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 14px;
}
.nav button {
  background: rgba(100,200,255,0.15);
  border: 1px solid rgba(100,200,255,0.3);
  color: var(--accent);
  font-size: 1.2rem;
  width: 34px; height: 34px;
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
}
.nav button:hover { background: rgba(100,200,255,0.35); }
.nav-center { display: flex; align-items: center; gap: 8px; }
.nav select {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(100,200,255,0.3);
  color: #fff;
  font-size: 0.95rem;
  padding: 4px 8px;
  border-radius: 7px;
  cursor: pointer;
  outline: none;
}
.nav select option { background: #1a1a2e; }
.today-btn {
  background: rgba(100,200,255,0.2);
  border: 1px solid rgba(100,200,255,0.4);
  color: var(--accent);
  font-size: 0.78rem;
  padding: 4px 12px;
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.2s;
}
.today-btn:hover { background: rgba(100,200,255,0.4); }
.grid-header {
  display: grid;
  grid-template-columns: repeat(7,1fr);
  text-align: center;
  margin-bottom: 6px;
}
.grid-header span {
  font-size: 0.78rem;
  font-weight: bold;
  padding: 5px 0;
  color: #aad4f5;
}
.grid-header span:first-child { color: #ff7b7b; }
.grid-header span:last-child  { color: #7bc8ff; }
.grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
.cell {
  min-height: 76px;
  border-radius: 8px;
  padding: 5px;
  background: rgba(255,255,255,0.025);
  border: 1px solid rgba(255,255,255,0.05);
  cursor: pointer;
  transition: all 0.15s;
  display: flex;
  flex-direction: column;
}
.cell:hover { background: rgba(100,200,255,0.08); border-color: rgba(100,200,255,0.22); }
.cell.empty { background: transparent; border-color: transparent; cursor: default; }
.cell.today { background: rgba(100,200,255,0.12); border: 2px solid rgba(100,200,255,0.6); box-shadow: 0 0 8px rgba(100,200,255,0.18); }
.cell.sunday  .day-num { color: #ff7b7b; }
.cell.saturday .day-num { color: #7bc8ff; }
.cell.holiday .day-num { color: #ff9f43 !important; }
.day-num { font-size: 0.95rem; font-weight: bold; line-height: 1; }
.lunar { font-size: 0.62rem; color: rgba(255,255,255,0.4); margin-top: 2px; }
.ev-cell { margin-top: 3px; display: flex; flex-direction: column; gap: 2px; overflow: hidden; }
.ev-dot {
  font-size: 0.6rem;
  background: rgba(100,200,255,0.2);
  border-left: 2px solid var(--accent);
  padding: 1px 3px;
  border-radius: 0 3px 3px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #cce8ff;
}
.ev-dot.loc { border-left-color: var(--accent2); background: rgba(167,139,250,0.15); color: #ddd6fe; }

/* ══ 待辦面板 ══ */
.todo-panel {
  width: 100%;
  flex-shrink: 0;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  padding: 10px 12px;
  gap: 8px;
}
.tabs { display: flex; gap: 5px; flex-shrink: 0; }
.tab {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.45);
  font-size: 0.72rem;
  padding: 5px 0;
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.tab.active {
  background: rgba(100,200,255,0.18);
  border-color: rgba(100,200,255,0.4);
  color: var(--accent);
}
.add-row { display: flex; gap: 6px; flex-shrink: 0; }
.add-row input {
  flex: 1;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(100,200,255,0.22);
  color: #fff;
  padding: 7px 10px;
  border-radius: 7px;
  font-size: 0.84rem;
  outline: none;
  font-family: inherit;
  user-select: text;
}
.add-row input:focus { border-color: rgba(100,200,255,0.55); background: rgba(100,200,255,0.07); }
.add-row input::placeholder { color: rgba(255,255,255,0.28); }
.add-btn {
  background: rgba(100,200,255,0.22);
  border: 1px solid rgba(100,200,255,0.38);
  color: var(--accent);
  font-size: 1.2rem;
  width: 34px; height: 34px;
  border-radius: 7px;
  cursor: pointer;
  line-height: 1;
  transition: all 0.15s;
}
.add-btn:hover { background: rgba(100,200,255,0.42); }
.todo-list {
  flex: 1;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 5px;
  padding-right: 2px;
}
.todo-list::-webkit-scrollbar { width: 4px; }
.todo-list::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.25); border-radius: 2px; }
.t-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 10px;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  border-left: 3px solid rgba(100,200,255,0.2);
  transition: all 0.15s;
}
.t-item:hover { background: rgba(255,255,255,0.07); }
.t-item.done { opacity: 0.42; }
.chk {
  width: 16px; height: 16px;
  flex-shrink: 0;
  appearance: none;
  border: 2px solid rgba(100,200,255,0.4);
  border-radius: 4px;
  cursor: pointer;
  margin-top: 1px;
  position: relative;
  background: transparent;
  transition: all 0.15s;
}
.chk:checked { background: var(--accent); border-color: var(--accent); }
.chk:checked::after {
  content: '✓';
  position: absolute;
  top: -2px; left: 1px;
  font-size: 11px;
  color: #0a1628;
  font-weight: bold;
}
.t-body { flex: 1; min-width: 0; }
.t-text {
  font-size: 0.84rem;
  line-height: 1.4;
  word-break: break-all;
  color: #ddeeff;
  user-select: text;
}
.t-item.done .t-text { text-decoration: line-through; color: rgba(255,255,255,0.35); }
.del-btn {
  background: none;
  border: none;
  color: rgba(255,100,100,0.35);
  font-size: 0.85rem;
  cursor: pointer;
  padding: 0 2px;
  flex-shrink: 0;
  line-height: 1;
  transition: color 0.15s;
}
.del-btn:hover { color: #ff6464; }
.t-empty { text-align: center; color: rgba(255,255,255,0.28); font-size: 0.8rem; padding: 24px 0; }
.todo-bottom { flex-shrink: 0; display: flex; flex-direction: column; gap: 5px; }

/* ── 待辦圖片預覽條（新增時） ── */
.todo-img-strip {
  display: none;
  flex-wrap: nowrap;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 2px;
  flex-shrink: 0;
}
.todo-img-strip.has-imgs { display: flex; }
.todo-img-strip::-webkit-scrollbar { height: 3px; }
.todo-img-strip::-webkit-scrollbar-thumb { background: rgba(100,200,255,0.2); border-radius: 2px; }
.t-img-thumb {
  position: relative;
  width: 54px; height: 54px;
  flex-shrink: 0;
  border-radius: 7px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12);
  cursor: pointer;
}
.t-img-thumb img { width:100%; height:100%; object-fit:cover; display:block; }
.t-img-thumb .tdel {
  position: absolute; top:2px; right:2px;
  background: rgba(0,0,0,0.65);
  color: #ff9090; border: none;
  border-radius: 50%; width:17px; height:17px;
  font-size:0.6rem; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
}
.t-img-thumb .tdel:hover { background:rgba(200,0,0,0.75); color:#fff; }

/* ── 待辦列表內的圖片 ── */
.t-imgs {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 7px;
}
.t-img {
  width: 58px; height: 58px;
  object-fit: cover;
  border-radius: 7px;
  cursor: pointer;
  border: 1px solid rgba(255,255,255,0.1);
  transition: transform 0.15s;
  flex-shrink: 0;
}
.t-img:hover { transform: scale(1.06); }

/* 📷 上傳按鈕（新增列旁） */
.cam-btn {
  background: rgba(100,200,255,0.12);
  border: 1px solid rgba(100,200,255,0.28);
  color: rgba(100,200,255,0.7);
  font-size: 1.15rem;
  width: 34px; height: 34px;
  border-radius: 7px;
  cursor: pointer;
  display: flex; align-items:center; justify-content:center;
  flex-shrink: 0;
  transition: all 0.15s;
}
.cam-btn:hover { background:rgba(100,200,255,0.25); color:var(--accent); }
.clear-btn {
  width: 100%;
  background: rgba(255,70,70,0.08);
  border: 1px solid rgba(255,70,70,0.2);
  color: rgba(255,120,120,0.6);
  font-size: 0.75rem;
  padding: 6px;
  border-radius: 7px;
  cursor: pointer;
  font-family: inherit;
  transition: all 0.15s;
}
.clear-btn:hover { background: rgba(255,70,70,0.2); color: #ff9090; }
.dt-bar {
  text-align: center;
  font-size: 0.68rem;
  color: rgba(255,255,255,0.24);
  padding: 2px 0;
}
/* ══ 待辦編輯 Modal ══ */
.todo-edit-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.72);
  z-index: 300;
  align-items: center;
  justify-content: center;
}
.todo-edit-bg.show { display: flex; }
.todo-edit-modal {
  background: rgba(12,22,52,0.97);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(100,200,255,0.2);
  border-radius: 16px;
  padding: 20px 18px;
  width: 360px;
  max-width: 96vw;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.65);
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.todo-edit-modal h3 { font-size: 0.95rem; color: var(--accent); }
.todo-edit-modal textarea {
  width: 100%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(100,200,255,0.25);
  color: #fff;
  padding: 10px 12px;
  border-radius: 9px;
  font-size: 0.9rem;
  font-family: inherit;
  resize: vertical;
  min-height: 72px;
  outline: none;
}
.todo-edit-modal textarea:focus { border-color: rgba(100,200,255,0.55); }
.todo-edit-imgs { display: flex; flex-wrap: wrap; gap: 7px; }
.te-img-wrap {
  position: relative; width: 72px; height: 72px;
  border-radius: 9px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.12); flex-shrink: 0;
}
.te-img-wrap img { width:100%; height:100%; object-fit:cover; cursor:pointer; display:block; }
.te-img-del {
  position: absolute; top:2px; right:2px;
  background: rgba(0,0,0,0.65); color:#ff9090;
  border: none; border-radius: 50%;
  width:18px; height:18px; font-size:0.65rem;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
}
.te-img-del:hover { background:rgba(200,0,0,0.7); color:#fff; }
.todo-edit-add-img {
  background: rgba(100,200,255,0.08);
  border: 1.5px dashed rgba(100,200,255,0.35);
  color: rgba(100,200,255,0.7);
  font-size: 0.82rem;
  padding: 8px 14px;
  border-radius: 9px; cursor: pointer;
  font-family: inherit; transition: all 0.15s;
  align-self: flex-start;
}
.todo-edit-add-img:hover { background: rgba(100,200,255,0.18); color: var(--accent); }
.todo-edit-btns { display: flex; gap: 7px; }
.te-save {
  flex: 1;
  background: rgba(100,200,255,0.22);
  border: 1px solid rgba(100,200,255,0.38);
  color: var(--accent); padding: 9px;
  border-radius: 9px; cursor: pointer;
  font-size: 0.88rem; font-family: inherit;
}
.te-save:hover { background: rgba(100,200,255,0.4); }
.te-del {
  background: rgba(255,70,70,0.1);
  border: 1px solid rgba(255,70,70,0.28);
  color: rgba(255,120,120,0.85);
  padding: 9px 12px; border-radius: 9px;
  cursor: pointer; font-size: 0.88rem; font-family: inherit;
}
.te-del:hover { background: rgba(255,70,70,0.25); color: #ff9090; }
.te-cancel {
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.12);
  color: #888; padding: 9px 12px;
  border-radius: 9px; cursor: pointer;
  font-size: 0.88rem; font-family: inherit;
}
.te-cancel:hover { color: #fff; background: rgba(255,255,255,0.12); }
/* 圖片數量小徽章 */
.t-img-badge {
  font-size: 0.62rem; color: rgba(100,200,255,0.55);
  margin-top: 2px; display: inline-block;
}

/* ══ Modal ══ */
.modal-bg {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.65);
  z-index: 200;
  align-items: center;
  justify-content: center;
}
.modal-bg.show { display: flex; }
.modal {
  background: rgba(15,25,55,0.75);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(100,200,255,0.2);
  border-radius: 14px;
  padding: 22px 26px 18px;
  width: 420px;
  max-width: 96vw;
  max-height: 88vh;
  overflow-y: auto;
  box-shadow: 0 16px 48px rgba(0,0,0,0.6);
}
.modal h2 { font-size: 1rem; margin-bottom: 12px; color: var(--accent); line-height: 1.5; }
.ev-list { margin-bottom: 12px; }
.ev-card {
  background: rgba(255,255,255,0.04);
  border-radius: 9px;
  padding: 9px 11px;
  margin-bottom: 7px;
  border-left: 3px solid rgba(100,200,255,0.5);
  position: relative;
}
.ev-card.loc { border-left-color: var(--accent2); }
.ev-card-title { font-size: 0.88rem; font-weight: bold; color: #e0f0ff; margin-bottom: 3px; padding-right: 66px; }
.ev-card-loc  { font-size: 0.76rem; color: #c4b5fd; margin-bottom: 2px; }
.ev-card-memo { font-size: 0.76rem; color: rgba(255,255,255,0.48); white-space: pre-wrap; word-break: break-all; }
.ev-card-actions { position: absolute; top: 7px; right: 7px; display: flex; gap: 4px; }
.btn-edit, .btn-del-ev {
  border: none; font-size: 0.7rem; padding: 3px 7px; border-radius: 5px; cursor: pointer;
}
.btn-edit    { background: rgba(100,200,255,0.2); color: var(--accent); }
.btn-edit:hover { background: rgba(100,200,255,0.4); }
.btn-del-ev  { background: rgba(255,80,80,0.2); color: #ff8080; }
.btn-del-ev:hover { background: rgba(255,80,80,0.4); }
.form-sec {
  background: rgba(255,255,255,0.03);
  border-radius: 9px;
  padding: 12px;
  margin-bottom: 10px;
  border: 1px solid rgba(100,200,255,0.1);
}
.form-sec h3 { font-size: 0.8rem; color: var(--accent); margin-bottom: 9px; }
.field { margin-bottom: 9px; }
.field label { display: block; font-size: 0.74rem; color: rgba(255,255,255,0.48); margin-bottom: 3px; }
.field input, .field textarea {
  width: 100%;
  background: rgba(255,255,255,0.09);
  border: 1px solid rgba(100,200,255,0.22);
  color: #fff;
  padding: 7px 9px;
  border-radius: 6px;
  font-size: 0.84rem;
  outline: none;
  font-family: inherit;
  resize: vertical;
}
.field input:focus, .field textarea:focus { border-color: rgba(100,200,255,0.55); }
.field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.28); }
.field textarea { min-height: 60px; }
.form-btns { display: flex; gap: 7px; }
.btn-save {
  flex: 1;
  background: rgba(100,200,255,0.22);
  border: 1px solid rgba(100,200,255,0.38);
  color: var(--accent);
  padding: 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.86rem;
}
.btn-save:hover { background: rgba(100,200,255,0.42); }
.btn-cancel {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.14);
  color: #aaa;
  padding: 8px 13px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.86rem;
}
.btn-cancel:hover { background: rgba(255,255,255,0.14); color: #fff; }
.modal-close {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: none;
  color: #888;
  padding: 8px;
  border-radius: 7px;
  cursor: pointer;
  font-size: 0.88rem;
}
.modal-close:hover { background: rgba(255,255,255,0.13); color: #fff; }
.ev-empty { color: rgba(255,255,255,0.33); font-size: 0.8rem; padding: 5px 0 9px; text-align: center; }

/* ══ 圖片上傳區 ══ */
.img-drop-zone {
  border: 1.5px dashed rgba(100,200,255,0.3);
  border-radius: 8px;
  padding: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  background: rgba(100,200,255,0.03);
  position: relative;
}
.img-drop-zone:hover, .img-drop-zone.drag-over {
  border-color: rgba(100,200,255,0.6);
  background: rgba(100,200,255,0.08);
}
.img-drop-hint {
  font-size: 0.74rem;
  color: rgba(255,255,255,0.35);
  pointer-events: none;
}

function lunarDate(sY,sM,sD){
  const base=new Date(1900,0,31);
  let off=Math.round((new Date(sY,sM-1,sD)-base)/86400000),i,tmp=0,lM,lD,isLY=false;
  for(i=1900;i<2100&&off>0;i++){tmp=lyd(i);off-=tmp;}
  if(off<=0){off+=tmp;i--;}
  const y=i,lp=lmn(y);
  for(i=1;i<=12&&off>0;i++){
    if(lp>0&&lp===i-1&&!isLY){isLY=true;i--;tmp=ld(y);}
    else{isLY=false;tmp=md(y,i);}
    off-=tmp;
  }
  if(off===0&&lp>0&&i===lp+1)isLY=isLY?false:(i--,true);
  if(off<0){off+=tmp;i--;}
  return{m:i,d:off+1,leap:isLY};
}
function lunarStr(y,m,d){
  try{const l=lunarDate(y,m,d);return l.d===1?(l.leap?'閏':'')+LMN[l.m-1]+'月':LDN[l.d-1];}catch(e){return'';}
}

// ══ IndexedDB 圖片儲存 ══
const IDB_NAME = 'calImgDB', IDB_VER = 1;
let idb = null;
function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, IDB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore('imgs', { keyPath: 'id' });
    req.onsuccess = e => { idb = e.target.result; res(idb); };
    req.onerror   = e => rej(e);
  });
}
function idbSave(id, dataUrl) {
  return new Promise((res, rej) => {
    const tx = idb.transaction('imgs','readwrite');
    tx.objectStore('imgs').put({ id, dataUrl });
    tx.oncomplete = res; tx.onerror = rej;
  });
}
function idbGet(id) {
  return new Promise((res, rej) => {
    const req = idb.transaction('imgs','readonly').objectStore('imgs').get(id);
    req.onsuccess = e => res(e.target.result?.dataUrl);
    req.onerror   = rej;
  });
}
function idbDel(id) {
  return new Promise((res, rej) => {
    const tx = idb.transaction('imgs','readwrite');
    tx.objectStore('imgs').delete(id);
    tx.oncomplete = res; tx.onerror = rej;
  });
}

// ══ 月曆渲染 ══
function p2(n){return String(n).padStart(2,'0');}
function dk(y,m,d){return`${y}-${p2(m+1)}-${p2(d)}`;}
function renderCal(){
  if(yearSel)yearSel.value=curY;
  const ms=document.getElementById('monthSel');
  if(ms)ms.value=curM;
  const grid=document.getElementById('calGrid');
  if(!grid)return;
  grid.innerHTML='';
  const fd=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  const hols=holidays(curY);
  for(let i=0;i<fd;i++){const c=document.createElement('div');c.className='cell empty';grid.appendChild(c);}
  for(let d=1;d<=dim;d++){
    const dow=new Date(curY,curM,d).getDay();
    const key=dk(curY,curM,d);
    const isT=curY===now0.getFullYear()&&curM===now0.getMonth()&&d===now0.getDate();
    const isH=!!hols[key];
    let cls='cell';
    if(isT)cls+=' today';if(dow===0)cls+=' sunday';if(dow===6)cls+=' saturday';if(isH)cls+=' holiday';
    const cell=document.createElement('div');
    cell.className=cls;
    const ln=lunarStr(curY,curM+1,d);
    cell.innerHTML=`<span class="day-num">${d}</span><span class="lunar">${isH?hols[key]:(ln||'')}</span><div class="ev-cell" id="evc-${key}"></div>`;
    cell.addEventListener('click',()=>openModal(curY,curM,d));
    grid.appendChild(cell);
    renderEvCell(key);
  }
}
function renderEvCell(key){
  const c=document.getElementById(`evc-${key}`);
  if(!c)return;
  c.innerHTML='';
  const a=evs[key]||[];
  a.slice(0,2).forEach(e=>{
    const d=document.createElement('div');
    d.className='ev-dot'+(e.loc?' loc':'');
    d.textContent=(e.loc?'📍':'•')+' '+e.title;
    c.appendChild(d);
  });
  if(a.length>2){const m=document.createElement('div');m.className='ev-dot';m.textContent=`+${a.length-2}`;c.appendChild(m);}
}

  document.getElementById('fTitle').value=e.title||'';

function addThumb(dataUrl){
  const row = document.getElementById('imgPreviewRow');
  const wrap = document.createElement('div');
  wrap.className='img-thumb-wrap';
  const img = document.createElement('img'); img.src=dataUrl;
  img.addEventListener('click',()=>openLightbox(dataUrl));
  const del = document.createElement('button');
  del.className='img-thumb-del'; del.textContent='✕';
  del.addEventListener('click',e=>{
    e.stopPropagation();
    formImgs=formImgs.filter(f=>f.dataUrl!==dataUrl);
    wrap.remove();
  });
  wrap.appendChild(img); wrap.appendChild(del);
  row.appendChild(wrap);
}

// ── 圖片壓縮（最大 1200px，JPEG 75%）──
function compressImg(file){
  return new Promise(res=>{
    const url=URL.createObjectURL(file);
    const img=new Image();
    img.onload=()=>{
      const MAX=1200;
      const w=Math.min(img.width,MAX);
      const h=Math.round(img.height*(w/img.width));
      const cv=document.createElement('canvas');
      cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      URL.revokeObjectURL(url);
      res(cv.toDataURL('image/jpeg',0.75));
    };
    img.onerror=()=>{ URL.revokeObjectURL(url); res(null); };
    img.src=url;
  });
}
async function addImgFile(file){
  if(!file.type.startsWith('image/'))return;
  const dataUrl=await compressImg(file);
  if(!dataUrl)return;
  formImgs.push({dataUrl});
  addThumb(dataUrl);
}

  if(e.key==='ArrowLeft')go(0,-1);
  if(e.key==='ArrowRight')go(0,1);

function renderTodos() {
  const list = document.getElementById('todoList');
  list.innerHTML = '';
  const done = todos.filter(x => x.done).length;
  const badgeText = `${done}/${todos.length}`;
  const badgeEl = document.getElementById('badge');
  if (badgeEl) badgeEl.textContent = badgeText;
  const mb = document.getElementById('mobBadge');
  if (mb) mb.textContent = `待辦 ${badgeText}`;

  let show = todos;
  if (tFilter === 'pending') show = todos.filter(x => !x.done);
  if (tFilter === 'done') show = todos.filter(x => x.done);

  if (!show.length) {
    list.innerHTML = `<div class="t-empty">${tFilter === 'done' ? '尚無完成項目' : '沒有待辦事項 🎉'}</div>`;
    return;
  }

  show.forEach(t => {
    const div = document.createElement('div');
    div.className = `t-item${t.done ? ' done' : ''}`;
    const imgCount = (t.images || []).length;
    div.innerHTML = `
      <input type="checkbox" class="chk" ${t.done ? 'checked' : ''}>
      <div class="t-body">
        <div class="t-text">${esc(t.text)}</div>
        ${imgCount ? `<span class="t-img-badge">🖼 ${imgCount} 張圖</span>` : ''}
      </div>
      <button class="del-btn" title="刪除">✕</button>`;

    div.querySelector('.t-body').style.cursor = 'pointer';
    div.querySelector('.t-body').addEventListener('click', () => openTodoEdit(t.id));
    div.querySelector('.chk').addEventListener('change', () => {
      const it = todos.find(x => x.id === t.id);
      if (it) { it.done = !it.done; saveTodos(); renderTodos(); }
    });
    div.querySelector('.del-btn').addEventListener('click', e => {
      e.stopPropagation();
      todos = todos.filter(x => x.id !== t.id);
      saveTodos(); renderTodos();
    });
    list.appendChild(div);
  });
}

let todoEditId = null;

function openTodoEdit(id) {
  const t = todos.find(x => x.id === id);

  todoEditId = id;
  document.getElementById('todoEditText').value = t.text;
  renderTodoEditImgs(t);
  document.getElementById('todoEditBg').classList.add('show');

function renderTodoEditImgs(t) {
  const imgs = (t.images || []);
  const container = document.getElementById('todoEditImgs');
  container.innerHTML = '';
  imgs.forEach(dataUrl => {
    const wrap = document.createElement('div');
    wrap.className = 'te-img-wrap';
    const img = document.createElement('img');
    img.src = dataUrl;
    img.addEventListener('click', () => openLightbox(dataUrl));
    const del = document.createElement('button');
    del.className = 'te-img-del'; del.textContent = '✕';
    del.addEventListener('click', e => {
      e.stopPropagation();
      const it = todos.find(x => x.id === todoEditId);
      if (it) { it.images = it.images.filter(d => d !== dataUrl); saveTodos(); renderTodoEditImgs(it); renderTodos(); }
    });
    wrap.appendChild(img); wrap.appendChild(del);
    container.appendChild(wrap);
  });
}

  document.getElementById('todoEditBg').classList.remove('show');

});

document.getElementById('todoEditCancel').addEventListener('click', () => {
  document.getElementById('todoEditBg').classList.remove('show');
  todoEditId = null;
});
document.getElementById('todoEditBg').addEventListener('click', e => {
  if (e.target === document.getElementById('todoEditBg')) {
    document.getElementById('todoEditBg').classList.remove('show');
    todoEditId = null;
  }
});
window.addEventListener('storage',e=>{
  if(e.key===TODO_KEY){try{todos=JSON.parse(e.newValue)||[];}catch(x){}renderTodos();}
  if(e.key===EV_KEY){try{evs=JSON.parse(e.newValue)||{};}catch(x){}renderCal();}
});

// ══ 全螢幕 ══
function toggleFS(){
  if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.getElementById('fsBtn').addEventListener('click',toggleFS);
document.addEventListener('keydown',e=>{if(e.key==='F11'){e.preventDefault();toggleFS();}});
document.addEventListener('fullscreenchange',()=>{
  const btn=document.getElementById('fsBtn');
  btn.textContent=document.fullscreenElement?'⊡':'⛶';
  btn.title=document.fullscreenElement?'離開全螢幕 (F11)':'全螢幕 (F11)';
});

// ══ 手機版 Tab 切換 ══
function switchMobTab(tab) {
  const cal = document.querySelector('.calendar-wrapper');
  const todo = document.querySelector('.todo-panel');
  if (tab === 'cal') {
    cal.classList.remove('mob-hidden');
    todo.classList.remove('mob-show');
  } else {
    cal.classList.add('mob-hidden');
    todo.classList.add('mob-show');
  }
  document.querySelectorAll('.mob-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mob === tab);
  });
}
document.querySelectorAll('.mob-tab').forEach(t => {
  t.addEventListener('click', () => switchMobTab(t.dataset.mob));
});

// ══ 初始化 ══
renderCal();
renderTodos();
openIDB().catch(e => console.warn('IndexedDB 無法開啟，圖片功能停用', e));
// 手機預設顯示待辦事項 tab
if (window.innerWidth < 520) switchMobTab('todo');
</script>

<!-- ══ Firebase 雲端同步 ══ -->
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.1/firebase-database-compat.js"></script>
<script>
(function(){
  const firebaseConfig = {
    apiKey: "AIzaSyBkEKDFxro5r5FOZ5-7JFAraTi3ZzuhwcA",
    authDomain: "my-calender-2f43b.firebaseapp.com",
    databaseURL: "https://my-calender-2f43b-default-rtdb.firebaseio.com",
    projectId: "my-calender-2f43b",
    storageBucket: "my-calender-2f43b.firebasestorage.app",
    messagingSenderId: "175299074052",
    appId: "1:175299074052:web:54aba2841558e89bfefd51"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();
  const REF = 'shared';
  let ignoreRemote = false;

  // 同步狀態顯示
  const syncEl = document.createElement('div');
  syncEl.style.cssText = 'position:fixed;bottom:6px;left:50%;transform:translateX(-50%);font-size:11px;color:rgba(100,220,100,0.75);z-index:9999;pointer-events:none;letter-spacing:1px;';
  syncEl.textContent = '☁️ 連線中...';
  document.body.appendChild(syncEl);
  db.ref('.info/connected').on('value', s => {
    syncEl.textContent = s.val() ? '☁️ 已同步' : '📴 離線';
    syncEl.style.color = s.val() ? 'rgba(100,220,100,0.75)' : 'rgba(255,160,50,0.85)';
  });

  // 推送到 Firebase
  window.fbSaveTodos = function(){
    ignoreRemote = true;
    db.ref(REF+'/todos').set(todos).then(()=>setTimeout(()=>{ignoreRemote=false;},1500)).catch(()=>{ignoreRemote=false;});
  };
  window.fbSaveEv = function(){
    ignoreRemote = true;
    db.ref(REF+'/evs').set(evs).then(()=>setTimeout(()=>{ignoreRemote=false;},1500)).catch(()=>{ignoreRemote=false;});
  };

  // 監聽遠端變動（其他裝置更新時自動同步）
  db.ref(REF+'/todos').on('value', snap => {
    if(ignoreRemote) return;
    const d = snap.val();
    if(d && JSON.stringify(d) !== JSON.stringify(todos)){
      todos = d;
      localStorage.setItem(TODO_KEY, JSON.stringify(todos));
      renderTodos();
    }
  });
  db.ref(REF+'/evs').on('value', snap => {
    if(ignoreRemote) return;
    const d = snap.val();
    if(d && JSON.stringify(d) !== JSON.stringify(evs)){
      evs = d;
      localStorage.setItem(EV_KEY, JSON.stringify(evs));
      renderCal();
    }
  });

  // 首次載入：從 Firebase 取資料，若雲端無資料則上傳本地資料
  db.ref(REF).once('value', snap => {
    const d = snap.val();
    if(!d){
      if(todos.length) db.ref(REF+'/todos').set(todos);
      if(Object.keys(evs).length) db.ref(REF+'/evs').set(evs);
      return;
    }
    let changed = false;
    if(d.todos){ todos=d.todos; localStorage.setItem(TODO_KEY,JSON.stringify(todos)); changed=true; }
    if(d.evs){ evs=d.evs; localStorage.setItem(EV_KEY,JSON.stringify(evs)); changed=true; }
    if(changed){ renderTodos(); renderCal(); }
  });
})();
</script>
